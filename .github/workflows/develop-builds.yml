name: Build and Deploy to develop-builds

on:
  push:
    branches:
      - develop

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout develop branch
        uses: actions/checkout@v3
        with:
          ref: develop
          fetch-depth: 0  # Need full history to switch branches
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '16'
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.14'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build compressed bundles
        run: |
          npm run prepublish
          echo "✅ Build completed"
      
      - name: Verify FieldCustom is in bundle
        run: |
          if ! grep -q "FieldCustom" blockly_compressed_horizontal.js; then
            echo "❌ ERROR: FieldCustom not found in horizontal bundle"
            exit 1
          fi
          if ! grep -q "FieldCustom" blockly_compressed_vertical.js; then
            echo "❌ ERROR: FieldCustom not found in vertical bundle"
            exit 1
          fi
          echo "✅ FieldCustom verified in bundles"
      
      - name: Check for merge conflict markers
        run: |
          if grep -r "<<<<<<< HEAD\|=======\|>>>>>>>" blockly_compressed*.js blocks_compressed*.js; then
            echo "❌ ERROR: Conflict markers found in compiled files"
            exit 1
          fi
          echo "✅ No conflict markers found"
      
      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      
      - name: Clean working directory
        run: |
          # Reset any changes from the build
          git reset --hard HEAD
          git clean -fd
      
      - name: Switch to develop-builds branch
        run: |
          git fetch origin develop-builds:develop-builds || git branch develop-builds
          git checkout develop-builds
      
      - name: Replace with fresh builds from develop
        run: |
          DEVELOP_SHA=$(git rev-parse --short origin/develop)
          
          # Copy all compiled files from develop
          git checkout origin/develop -- blockly_compressed*.js blocks_compressed*.js msg/
          
          # Also copy any other dist files if they exist
          if git ls-tree -r origin/develop --name-only | grep -q "^dist/"; then
            git checkout origin/develop -- dist/ || true
          fi
          
          # Stage all changes
          git add -A
          
          # Commit only if there are changes
          if git diff --staged --quiet; then
            echo "✅ No changes to commit"
          else
            git commit -m "Auto-build: Update compiled files from develop ($DEVELOP_SHA)"
            echo "✅ Committed changes"
          fi
      
      - name: Push to develop-builds
        run: |
          git push origin develop-builds
          echo "✅ Successfully pushed to develop-builds"
